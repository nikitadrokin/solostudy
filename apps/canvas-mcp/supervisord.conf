[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:http]
command=node dist/http.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:tunnel]
command=poke tunnel http://localhost:3001/mcp --name "Canvas (Coolify)"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
